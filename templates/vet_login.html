<!DOCTYPE html>
<html>

<head>

<title>Veterinarian Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-header bg-dark text-white">

<h3>Veterinarian Login</h3>

</div>

<div class="card-body">

{% with messages=get_flashed_messages() %}

{% if messages %}

{% for message in messages %}

<div class="alert alert-danger">

{{ message }}

</div>

{% endfor %}

{% endif %}

{% endwith %}

<form method="POST">

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button
class="btn btn-warning w-100">

Login

</button>

</form>

<br>

<a href="/">

← Back Home

</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
