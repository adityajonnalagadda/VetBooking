<!DOCTYPE html>
<html>

<head>

    <title>Book Appointment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Book Veterinary Appointment</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">Select Pet</label>

<select class="form-select" name="pet_id" required>

<option value="">Choose Pet</option>

{% for pet in pets %}

<option value="{{ pet.id }}">

{{ pet.pet_name }} ({{ pet.species }})

</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label class="form-label">Select Veterinarian</label>

<select class="form-select" name="vet_id" required>

<option value="">Choose Veterinarian</option>

{% for vet in vets %}

<option value="{{ vet.id }}">

{{ vet.fullname }} - {{ vet.specialization }}

</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Date</label>

<input
type="date"
class="form-control"
name="appointment_date"
required>

</div>

<div class="mb-3">

<label>Time</label>

<input
type="time"
class="form-control"
name="appointment_time"
required>

</div>

<div class="mb-3">

<label>Service</label>

<select
class="form-select"
name="service_type">

<option>General Checkup</option>

<option>Vaccination</option>

<option>Emergency Visit</option>

<option>Surgery Consultation</option>

<option>Telemedicine</option>

</select>

</div>

<div class="mb-3">

<label>Home Address</label>

<textarea
class="form-control"
name="address"
rows="3"></textarea>

</div>

<div class="mb-3">

<label>Additional Notes</label>

<textarea
class="form-control"
name="notes"
rows="3"></textarea>

</div>

<button class="btn btn-success">

Book Appointment

</button>

<a href="/dashboard" class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

</body>

</html>
